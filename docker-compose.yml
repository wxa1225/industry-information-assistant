version: '3.8'

# ============================================================
# bupt324 专用部署配置
# 所有容器、网络、数据卷都加前缀，不影响机器上其他人的服务
# ============================================================

services:
  # ==================== Backend API ====================
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bupt324_api
    restart: unless-stopped
    environment:
      - POSTGRES_HOST=bupt324_postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-industry_assistant}
      - REDIS_HOST=bupt324_redis
      - REDIS_PORT=6379
      - MILVUS_HOST=bupt324_milvus
      - MILVUS_PORT=19530
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:8080}
      - AUTO_MIGRATE=false
      - DB_POOL_SIZE=10
      - DB_MAX_OVERFLOW=20
      - DB_POOL_TIMEOUT=30
      - DB_POOL_RECYCLE=1800
      # LLM API Keys
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - DASHSCOPE_BASE_URL=${DASHSCOPE_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      - BOCHAAI_API_KEY=${BOCHAAI_API_KEY}
      - SERPER_API_KEY=${SERPER_API_KEY}
      - TUSHARE_API_KEY=${TUSHARE_API_KEY}
      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/live')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - bupt324_network

  # ==================== PostgreSQL 数据库 ====================
  postgres:
    image: postgres:15-alpine
    container_name: bupt324_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-industry_assistant}
      TZ: Asia/Shanghai
    volumes:
      - bupt324_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bupt324_network

  # ==================== Redis 缓存 ====================
  redis:
    image: redis:7-alpine
    container_name: bupt324_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - bupt324_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bupt324_network

  # ==================== Milvus 向量数据库 ====================
  # v2.4.16 开始支持 ARM64 (aarch64) 架构
  milvus:
    image: milvusdb/milvus:v2.4.16
    container_name: bupt324_milvus
    restart: unless-stopped
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_USE_EMBED: true
      ETCD_DATA_DIR: /var/lib/milvus/etcd
      MINIO_USE_EMBED: true
      MINIO_DATA_DIR: /var/lib/milvus/minio
    volumes:
      - bupt324_milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 60s
    networks:
      - bupt324_network

  # ==================== 前端 (React + Nginx) ====================
  # 注意：端口用 8080，因为 3000 已被别人的 Open WebUI 占用
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bupt324_frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - api
    networks:
      - bupt324_network

volumes:
  bupt324_postgres_data:
  bupt324_redis_data:
  bupt324_milvus_data:

networks:
  bupt324_network:
    driver: bridge
